<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalshi Prediction Bot</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dash-bg': '#0f1117',
            'dash-card': '#1a1d2e',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f1117; color: #f3f4f6; font-family: 'Inter', system-ui, sans-serif; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .live-dot { animation: pulse-dot 1.5s infinite; }
    .card-expand { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .card-expand.open { max-height: 2000px; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    @keyframes spin-fast { to { transform: rotate(360deg); } }
    .spinner { animation: spin-fast 0.8s linear infinite; }
    @keyframes focus-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
      50%      { box-shadow: 0 0 0 6px rgba(250, 204, 21, 0.45); }
    }
    .focus-target { animation: focus-glow 1.4s ease-in-out 3; border-color: #facc15 !important; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─── TRADE EXECUTION CONFIG ─────────────────────────────────────────────────
//
// As of 2026-04-29 trade execution moved off localhost onto Vercel. The dashboard
// posts to TRADE_ENDPOINT with a Bearer token. The endpoint enforces:
//   • Bearer token check (DASHBOARD_TOKEN env var)
//   • Daily $ cap (DAILY_CAP_USD env var, queried against Kalshi /portfolio/fills)
//   • Dry-run gate (DRY_RUN_MODE env var)
//   • Audit log to Vercel runtime logs (replaces local SQLite write — see SYSTEM_MAP §3.1)
//
// Mike enters his token once via the "Set Trading Token" modal. It lives in
// localStorage on this device only. Clear via the Settings toggle in the header.

const DEFAULT_TRADE_ENDPOINT = "https://mikes-kalshi.vercel.app/api/kalshi-trade";
const TOKEN_STORAGE_KEY = "kalshi_dashboard_token_v1";
const ENDPOINT_STORAGE_KEY = "kalshi_dashboard_endpoint_v1";
const DECISIONS_STORAGE_KEY = "kalshi_bot_decisions_v5";

// Trade-size thresholds. HIGH_VALUE_USD is the line above which we make the user
// re-confirm with a re-typed amount and the button text becomes scarier. SOFT_CLIENT_CAP
// is the absolute most this client will let through without an explicit per-request
// override. Mike authorizes any size; the cap is just a sanity rail against fat-fingering.
const HIGH_VALUE_USD = 50;       // Above this -> orange warning + confirm-text
const SOFT_CLIENT_CAP = 500;     // Above this -> input clamps; raise here if you mean it

function getStoredToken() {
  try { return localStorage.getItem(TOKEN_STORAGE_KEY) || ""; } catch { return ""; }
}
function setStoredToken(t) {
  try { if (t) localStorage.setItem(TOKEN_STORAGE_KEY, t); else localStorage.removeItem(TOKEN_STORAGE_KEY); } catch {}
}
function getStoredEndpoint() {
  try { return localStorage.getItem(ENDPOINT_STORAGE_KEY) || DEFAULT_TRADE_ENDPOINT; } catch { return DEFAULT_TRADE_ENDPOINT; }
}
function setStoredEndpoint(e) {
  try { if (e && e !== DEFAULT_TRADE_ENDPOINT) localStorage.setItem(ENDPOINT_STORAGE_KEY, e); else localStorage.removeItem(ENDPOINT_STORAGE_KEY); } catch {}
}

async function executeApproval({ ticker, side, amount, token, endpoint }) {
  if (!token) {
    return { success: false, error: "No trading token set. Click 'Set Token' in the header." };
  }
  if (!endpoint) {
    return { success: false, error: "No trade endpoint configured." };
  }
  try {
    const res = await fetch(endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`,
      },
      body: JSON.stringify({ ticker, side, amount }),
    });
    let body;
    try { body = await res.json(); } catch { body = { success: false, error: `Non-JSON response (${res.status})` }; }
    if (!res.ok && body && !body.error) body.error = `HTTP ${res.status}`;
    return body;
  } catch (e) {
    return { success: false, error: `Network error: ${e.message}` };
  }
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function timeAgo(isoStr) {
  if (!isoStr) return "never";
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 0) return "just now";
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function getQueryParam(name) {
  try {
    const url = new URL(window.location.href);
    return url.searchParams.get(name);
  } catch { return null; }
}

// ─── TOAST ──────────────────────────────────────────────────────────────────
function ToastContainer({ toasts }) {
  return (
    <div className="fixed bottom-4 right-4 z-50 space-y-2 pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`px-4 py-3 rounded-xl shadow-xl text-sm font-medium max-w-xs border ${
          t.type === 'error'  ? 'bg-red-900 text-red-200 border-red-700' :
          t.type === 'info'   ? 'bg-blue-900 text-blue-200 border-blue-700' :
                                'bg-green-900 text-green-200 border-green-700'
        }`}>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

// ─── TOKEN MODAL ────────────────────────────────────────────────────────────
function TokenModal({ open, currentToken, currentEndpoint, onSave, onCancel }) {
  const [token, setToken] = useState(currentToken || "");
  const [endpoint, setEndpoint] = useState(currentEndpoint || DEFAULT_TRADE_ENDPOINT);
  useEffect(() => { setToken(currentToken || ""); setEndpoint(currentEndpoint || DEFAULT_TRADE_ENDPOINT); }, [open, currentToken, currentEndpoint]);
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center px-4">
      <div className="bg-gray-900 border border-gray-700 rounded-2xl p-6 max-w-md w-full">
        <h2 className="text-lg font-semibold text-gray-100 mb-1">Trading Token</h2>
        <p className="text-xs text-gray-400 mb-4">
          Required to execute trades. Stored in this browser's localStorage only.
          Lives in Vercel as <code className="text-gray-300">DASHBOARD_TOKEN</code>.
        </p>
        <label className="block text-xs text-gray-500 mb-1">Token</label>
        <input
          type="password"
          autoFocus
          value={token}
          onChange={e => setToken(e.target.value)}
          placeholder="Bearer token"
          className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 mb-3 focus:outline-none focus:border-blue-500"
        />
        <label className="block text-xs text-gray-500 mb-1">Endpoint</label>
        <input
          type="text"
          value={endpoint}
          onChange={e => setEndpoint(e.target.value)}
          className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-300 font-mono mb-4 focus:outline-none focus:border-blue-500"
        />
        <div className="flex gap-2 justify-end">
          <button onClick={onCancel}
            className="px-3 py-2 text-sm text-gray-400 hover:text-gray-200">Cancel</button>
          <button onClick={() => onSave(token.trim(), endpoint.trim() || DEFAULT_TRADE_ENDPOINT)}
            className="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold">
            Save
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── CONNECTION STATUS ──────────────────────────────────────────────────────
function ConnectionBadge({ hasToken }) {
  return (
    <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${
      hasToken
        ? 'bg-green-900 text-green-300 border border-green-700'
        : 'bg-gray-800 text-gray-500 border border-gray-700'
    }`}>
      {hasToken ? 'LIVE TRADING' : 'VIEW ONLY'}
    </span>
  );
}

// ─── ACCOUNT OVERVIEW ───────────────────────────────────────────────────────
function AccountOverview({ data }) {
  const balance = data?.balance ?? 0;
  const positions = Array.isArray(data?.position_details)
    ? data.position_details
    : (Array.isArray(data?.positions) ? data.positions : []);
  const totalCost = positions.reduce((s, p) => s + (p.cost_dollars || 0), 0);
  const totalPnl = data?.total_pnl ?? 0;
  const openCount = typeof data?.positions === 'number' ? data.positions : positions.length;
  return (
    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
      <div className="bg-gray-800 rounded-xl border border-gray-700 p-4 text-center">
        <div className="text-2xl font-bold text-green-400">${balance.toFixed(2)}</div>
        <div className="text-xs text-gray-500 mt-1">Available Cash</div>
      </div>
      <div className="bg-gray-800 rounded-xl border border-gray-700 p-4 text-center">
        <div className="text-2xl font-bold text-blue-400">${totalCost.toFixed(2)}</div>
        <div className="text-xs text-gray-500 mt-1">In Positions</div>
      </div>
      <div className="bg-gray-800 rounded-xl border border-gray-700 p-4 text-center">
        <div className="text-2xl font-bold text-gray-100">{openCount}</div>
        <div className="text-xs text-gray-500 mt-1">Open Positions</div>
      </div>
      <div className="bg-gray-800 rounded-xl border border-gray-700 p-4 text-center">
        <div className={`text-2xl font-bold ${totalPnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
          {totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(2)}
        </div>
        <div className="text-xs text-gray-500 mt-1">Realized P&L</div>
      </div>
    </div>
  );
}

// ─── OPPORTUNITY CARD ───────────────────────────────────────────────────────
//
// State bug fix (2026-04-29):
//   Previous version passed `opp` as a prop and embedded it in a click closure.
//   Mike reported wrong-ticker toasts. The defensive fix is two-fold:
//     1. Snapshot the opp identity into a ref at click time so any later prop
//        change (data reload mid-flight) cannot mutate what we pass to onApprove.
//     2. Have onApprove receive ticker + side + amount EXPLICITLY, not via opp.
//        The parent looks up the latest opp from data by ticker before toasting.
//
function OpportunityCard({ opp, onApprove, onReject, decisions, focusTicker, hasToken }) {
  const [amount, setAmount] = useState(opp.suggested_size || 5);
  const [expanded, setExpanded] = useState(false);
  const [executing, setExecuting] = useState(false);
  const cardRef = useRef(null);
  const decided = decisions[opp.ticker];

  // Capture the ticker once on mount via ref — paranoid guard against any future
  // prop swap. The Approve handler reads from this, not from a fresh opp lookup.
  const tickerRef = useRef(opp.ticker);
  const sideRef = useRef(opp.side);
  useEffect(() => { tickerRef.current = opp.ticker; sideRef.current = opp.side; }, [opp.ticker, opp.side]);

  // Deep link: scroll into view + glow if this card matches ?focus=
  useEffect(() => {
    if (focusTicker && focusTicker === opp.ticker && cardRef.current) {
      cardRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, [focusTicker, opp.ticker]);

  const isFocused = focusTicker && focusTicker === opp.ticker;

  if (decided) {
    return (
      <div ref={cardRef} className={`bg-gray-800 rounded-xl border p-3 space-y-1 ${
        decided.action === 'approved' ? 'border-green-800' : 'border-red-800'
      } ${isFocused ? 'focus-target' : ''}`}>
        <div className="flex items-center justify-between gap-2">
          <div className="flex items-center gap-2 flex-wrap min-w-0">
            <span className={`px-2 py-0.5 rounded text-xs font-semibold border ${
              decided.action === 'approved'
                ? 'bg-green-900 text-green-300 border-green-700'
                : 'bg-red-900 text-red-300 border-red-700'
            }`}>
              {decided.action === 'approved' ? (decided.executed ? 'EXECUTED' : 'APPROVED') : 'REJECTED'}
            </span>
            <span className="font-mono text-sm text-gray-300 truncate">{opp.title || opp.ticker}</span>
            {decided.action === 'approved' && (
              <span className="text-sm font-semibold text-green-400">${(decided.amount || 0).toFixed ? decided.amount.toFixed(2) : decided.amount}</span>
            )}
          </div>
          <span className="text-xs text-gray-600 whitespace-nowrap flex-shrink-0">
            {new Date(decided.timestamp).toLocaleTimeString()}
          </span>
        </div>
        {decided.order_id && (
          <div className="text-xs text-gray-500">
            Order: <span className="font-mono text-gray-400">{decided.order_id}</span>
            {decided.contracts != null && <span> | {decided.contracts} contracts @ {decided.price_cents}c = ${decided.cost_dollars?.toFixed ? decided.cost_dollars.toFixed(2) : decided.cost_dollars}</span>}
          </div>
        )}
        {decided.error && (
          <div className="text-xs text-red-400">Error: {decided.error}</div>
        )}
      </div>
    );
  }

  const edgePct = (opp.edge * 100).toFixed(1);
  const aiPct = (opp.ai_prob * 100).toFixed(0);
  const mktPct = (opp.market_prob * 100).toFixed(0);

  const isHighValue = amount > HIGH_VALUE_USD;

  const handleApproveClick = () => {
    // Snapshot ticker/side at click — never trust a later prop swap.
    const t = tickerRef.current;
    const s = sideRef.current;
    setExecuting(true);
    onApprove(t, s, amount).finally(() => setExecuting(false));
  };

  return (
    <div ref={cardRef}
      className={`bg-gray-800 rounded-xl border ${isFocused ? 'focus-target' : 'border-yellow-700'} overflow-hidden`}>
      <div className="p-4 space-y-3">
        {/* Header */}
        <div className="flex items-start justify-between gap-2">
          <div className="space-y-1 flex-1 min-w-0">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="w-2 h-2 rounded-full bg-yellow-400 live-dot flex-shrink-0" />
              <span className="font-medium text-gray-100 text-sm">{opp.title || opp.ticker}</span>
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              <span className="font-mono text-xs text-gray-500">{opp.ticker}</span>
              <span className={`text-xs px-2 py-0.5 rounded font-semibold border ${
                opp.side === 'yes'
                  ? 'bg-green-900 text-green-300 border-green-700'
                  : 'bg-red-900 text-red-300 border-red-700'
              }`}>
                BUY {opp.side.toUpperCase()}
              </span>
              <span className={`text-xs px-1.5 py-0.5 rounded ${
                opp.confidence === 'high' ? 'bg-green-900 text-green-300' :
                opp.confidence === 'medium' ? 'bg-yellow-900 text-yellow-300' :
                'bg-gray-700 text-gray-400'
              }`}>
                {opp.confidence}
              </span>
              {opp.related_count > 0 && (
                <span className="text-xs px-1.5 py-0.5 rounded bg-purple-900 text-purple-300">
                  +{opp.related_count} related
                </span>
              )}
            </div>
          </div>
          <div className="text-right flex-shrink-0 pl-2">
            <div className="text-2xl font-bold text-yellow-400">{edgePct}%</div>
            <div className="text-xs text-gray-500">edge</div>
          </div>
        </div>

        {/* Probability comparison */}
        <div className="bg-gray-900 rounded-lg p-3 space-y-2">
          <div className="flex items-center justify-between text-sm">
            <span className="text-gray-400">AI estimate</span>
            <span className="font-mono font-bold text-blue-400">{aiPct}%</span>
          </div>
          <div className="relative h-2 bg-gray-700 rounded-full overflow-hidden">
            <div className="absolute h-full bg-blue-500 rounded-full" style={{width: `${aiPct}%`}} />
            <div className="absolute h-full w-0.5 bg-red-400" style={{left: `${mktPct}%`}} title="Market price" />
          </div>
          <div className="flex items-center justify-between text-xs text-gray-500">
            <span>Market: {mktPct}%</span>
            <span>AI sees {edgePct}% mispricing</span>
          </div>
        </div>

        {/* Red team flaw */}
        {opp.red_team_flaw && (
          <div className="bg-red-950 border border-red-900 rounded-lg p-3">
            <div className="text-xs text-red-500 uppercase font-semibold mb-1">Red Team Challenge ({opp.red_team_strength})</div>
            <p className="text-red-300 text-xs leading-relaxed">{opp.red_team_flaw}</p>
          </div>
        )}

        {/* Thesis toggle */}
        <button
          onClick={() => setExpanded(!expanded)}
          className="text-xs text-blue-400 hover:text-blue-300 transition-colors"
        >
          {expanded ? '- Hide reasoning' : '+ Show AI reasoning'}
        </button>
        <div className={`card-expand ${expanded ? 'open' : ''}`}>
          <div className="space-y-3 pt-1">
            {opp.thesis && (
              <div>
                <div className="text-xs text-green-500 uppercase font-semibold mb-1">Thesis</div>
                <p className="text-gray-300 text-sm leading-relaxed">{opp.thesis}</p>
              </div>
            )}
            {opp.counter_thesis && (
              <div>
                <div className="text-xs text-red-500 uppercase font-semibold mb-1">Counter-thesis</div>
                <p className="text-gray-400 text-sm leading-relaxed">{opp.counter_thesis}</p>
              </div>
            )}
            {opp.reasoning && (
              <div>
                <div className="text-xs text-gray-500 uppercase font-semibold mb-1">Full reasoning</div>
                <p className="text-gray-400 text-xs leading-relaxed">{opp.reasoning}</p>
              </div>
            )}
          </div>
        </div>

        {/* Sizing */}
        <div className="bg-gray-900 rounded-lg p-3 space-y-3">
          <div className="text-xs text-gray-400">
            Quarter-Kelly suggested: <span className="text-gray-200 font-semibold">${opp.suggested_size || 5}</span>
            <span className="text-gray-600 mx-2">|</span>
            Any size — Mike authorizes
          </div>
          <div className="flex items-center gap-2">
            <span className="text-xs text-gray-400">Amount:</span>
            <button onClick={() => setAmount(a => Math.max(0.5, +(a - 0.5).toFixed(2)))}
              className="w-8 h-8 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-200 text-lg font-bold flex items-center justify-center">-</button>
            <div className="flex items-center bg-gray-700 border border-gray-600 rounded-lg overflow-hidden">
              <span className="pl-2 text-gray-400 text-sm">$</span>
              <input type="number" value={amount} step="0.50" min="0.50"
                onChange={e => { const n = parseFloat(e.target.value); if (!isNaN(n) && n >= 0) setAmount(n); }}
                onBlur={() => {
                  if (amount < 0.5) setAmount(0.5);
                  if (amount > SOFT_CLIENT_CAP) setAmount(SOFT_CLIENT_CAP);
                }}
                className="w-20 h-8 pr-2 bg-transparent text-gray-100 text-center text-sm font-medium focus:outline-none" />
            </div>
            <button onClick={() => setAmount(a => +(a + 0.5).toFixed(2))}
              className="w-8 h-8 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-200 text-lg font-bold flex items-center justify-center">+</button>
          </div>
          {/* Quick amount chips for fast bigger sizing */}
          <div className="flex gap-1.5 flex-wrap">
            {[5, 10, 25, 50, 100].map(n => (
              <button key={n} onClick={() => setAmount(n)}
                className={`px-2.5 py-1 rounded text-xs font-medium transition-colors ${
                  amount === n
                    ? 'bg-blue-600 text-white'
                    : 'bg-gray-700 hover:bg-gray-600 text-gray-300'
                }`}>
                ${n}
              </button>
            ))}
          </div>
        </div>

        {/* High-value warning panel */}
        {isHighValue && (
          <div className="bg-orange-950 border-2 border-orange-600 rounded-lg p-3">
            <div className="flex items-start gap-2">
              <span className="text-orange-400 text-lg leading-none">⚠</span>
              <div className="flex-1">
                <div className="text-orange-300 text-sm font-semibold mb-1">
                  You're about to commit ${amount.toFixed(2)}
                </div>
                <div className="text-orange-200/80 text-xs leading-relaxed">
                  This is above the ${HIGH_VALUE_USD} review threshold. Confirm the ticker, side, and size before tapping below.
                </div>
              </div>
            </div>
          </div>
        )}

        <div className="flex gap-2">
          <button onClick={handleApproveClick}
            disabled={executing || !hasToken}
            className={`flex-1 py-3 rounded-xl font-bold text-sm transition-colors flex items-center justify-center gap-2 ${
              executing
                ? 'bg-gray-700 text-gray-400 cursor-wait'
                : !hasToken
                ? 'bg-gray-700 text-gray-500 cursor-not-allowed'
                : isHighValue
                ? 'bg-orange-600 hover:bg-orange-500 text-white'
                : 'bg-green-600 hover:bg-green-500 text-white'
            }`}>
            {executing ? (
              <>
                <svg className="w-4 h-4 spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" strokeWidth="3" strokeDasharray="32 32" /></svg>
                Placing Trade...
              </>
            ) : !hasToken ? (
              `Set token to trade`
            ) : isHighValue ? (
              `Confirm $${amount.toFixed(2)} trade — yes I'm sure`
            ) : (
              `Approve $${amount.toFixed(2)} trade`
            )}
          </button>
          <button onClick={() => onReject(tickerRef.current)}
            className="px-4 py-3 rounded-xl font-semibold text-sm bg-red-900 hover:bg-red-800 text-red-300 border border-red-800 transition-colors">
            Reject
          </button>
        </div>

        {!hasToken && (
          <div className="text-center text-xs text-gray-600">
            Click <span className="text-gray-400 font-medium">Set Token</span> in the header to enable trade execution
          </div>
        )}

        <a href={`https://kalshi.com/markets/${opp.ticker}`} target="_blank" rel="noopener noreferrer"
          className="block text-center text-xs text-gray-600 hover:text-gray-400 transition-colors">
          View on Kalshi
        </a>
      </div>
    </div>
  );
}

// ─── SCAN TAB ───────────────────────────────────────────────────────────────
function ScanView({ data, decisions, onApprove, onReject, focusTicker, hasToken }) {
  const scan = data?.latest_scan;
  const opportunities = data?.opportunities || [];
  const pendingCount = opportunities.filter(o => !decisions[o.ticker]).length;
  const approvedCount = opportunities.filter(o => decisions[o.ticker]?.action === 'approved').length;
  const rejectedCount = opportunities.filter(o => decisions[o.ticker]?.action === 'rejected').length;

  // Sort: focused ticker first, then preserve original order. Makes the deep
  // link land you right on the card without scrolling past pending peers.
  const orderedOpps = useMemo(() => {
    if (!focusTicker) return opportunities;
    const found = opportunities.find(o => o.ticker === focusTicker);
    if (!found) return opportunities;
    return [found, ...opportunities.filter(o => o.ticker !== focusTicker)];
  }, [opportunities, focusTicker]);

  return (
    <div className="space-y-6">
      {/* Scan summary */}
      <div className="bg-gray-800 rounded-xl border border-gray-700 p-4 space-y-3">
        <div className="flex items-center justify-between">
          <h3 className="text-blue-400 font-semibold text-sm uppercase tracking-wider">Latest Scan</h3>
          <span className="text-xs text-gray-500">{scan?.timestamp ? timeAgo(scan.timestamp) : 'No scan yet'}</span>
        </div>
        {scan ? (
          <div className="grid grid-cols-3 gap-3 text-center">
            <div>
              <div className="text-lg font-bold text-gray-100">{scan.markets_pulled || 0}</div>
              <div className="text-xs text-gray-500">Markets Scanned</div>
            </div>
            <div>
              <div className="text-lg font-bold text-gray-100">{scan.markets_analyzed || 0}</div>
              <div className="text-xs text-gray-500">AI Analyzed</div>
            </div>
            <div>
              <div className="text-lg font-bold text-yellow-400">{opportunities.length}</div>
              <div className="text-xs text-gray-500">Opportunities</div>
            </div>
          </div>
        ) : (
          <p className="text-gray-500 text-sm text-center py-4">
            Run <code className="bg-gray-900 px-1.5 py-0.5 rounded text-xs">python3 kalshi_predictor.py dry-run</code> to generate your first scan
          </p>
        )}
      </div>

      {/* Decision summary */}
      {opportunities.length > 0 && (
        <div className="flex gap-3 text-xs">
          {pendingCount > 0 && (
            <span className="px-2 py-1 rounded bg-yellow-900 text-yellow-300 font-semibold">
              {pendingCount} pending your review
            </span>
          )}
          {approvedCount > 0 && (
            <span className="px-2 py-1 rounded bg-green-900 text-green-300">
              {approvedCount} executed
            </span>
          )}
          {rejectedCount > 0 && (
            <span className="px-2 py-1 rounded bg-red-900 text-red-300">
              {rejectedCount} rejected
            </span>
          )}
        </div>
      )}

      {/* Deep-link miss */}
      {focusTicker && !opportunities.some(o => o.ticker === focusTicker) && (
        <div className="bg-yellow-900/30 border border-yellow-700 rounded-xl p-3 text-yellow-300 text-xs">
          Deep link target <code className="font-mono">{focusTicker}</code> isn't in the current opportunity list — it may have been resolved or scanned out. Showing all live opportunities below.
        </div>
      )}

      {/* Opportunity cards */}
      {opportunities.length > 0 ? (
        <div className="space-y-3">
          <h3 className="text-yellow-400 font-semibold text-sm uppercase tracking-wider flex items-center gap-2">
            <span className="w-2 h-2 rounded-full bg-yellow-400 live-dot" />
            Opportunities ({opportunities.length})
          </h3>
          {orderedOpps.map(opp => (
            <OpportunityCard
              key={opp.ticker}
              opp={opp}
              decisions={decisions}
              onApprove={onApprove}
              onReject={onReject}
              focusTicker={focusTicker}
              hasToken={hasToken}
            />
          ))}
        </div>
      ) : scan ? (
        <div className="text-gray-500 text-sm text-center py-8 bg-gray-800 rounded-xl border border-gray-700">
          No opportunities found in latest scan. The AI didn't find any markets mispriced by more than 10%.
        </div>
      ) : null}
    </div>
  );
}

// ─── POSITIONS TAB ──────────────────────────────────────────────────────────
function PositionsView({ data }) {
  const positions = Array.isArray(data?.position_details)
    ? data.position_details
    : (Array.isArray(data?.positions) ? data.positions : []);
  const trades = data?.trade_history || [];
  return (
    <div className="space-y-6">
      <div className="space-y-3">
        <h3 className="text-gray-400 font-semibold text-sm uppercase tracking-wider">
          Open Positions ({positions.length})
        </h3>
        {positions.length > 0 ? positions.map((pos, i) => (
          <div key={pos.ticker + i} className="bg-gray-800 rounded-xl border border-gray-700 p-4 space-y-2">
            <div className="flex items-start justify-between gap-2">
              <div className="space-y-1 flex-1 min-w-0">
                <div className="font-medium text-gray-100 text-sm">{pos.title || pos.ticker}</div>
                <div className="flex items-center gap-2 flex-wrap text-xs">
                  <span className="font-mono text-gray-500">{pos.ticker}</span>
                  <span className={`px-1.5 py-0.5 rounded ${
                    pos.side === 'yes' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'
                  }`}>{pos.side?.toUpperCase()}</span>
                  <span className="text-gray-400">x{pos.contracts} @ {pos.price_cents}c</span>
                </div>
              </div>
              <div className="text-right flex-shrink-0">
                <div className="text-sm font-semibold text-gray-200">${(pos.cost_dollars || 0).toFixed(2)}</div>
                <div className="text-xs text-gray-500">cost</div>
              </div>
            </div>
            <div className="flex items-center justify-between text-xs text-gray-500">
              <span>AI: {((pos.ai_probability || 0) * 100).toFixed(0)}% | Mkt: {((pos.market_probability || 0) * 100).toFixed(0)}%</span>
              <span>Edge: {((pos.edge || 0) * 100).toFixed(1)}%</span>
            </div>
            {pos.thesis && <p className="text-xs text-gray-400 leading-relaxed">{pos.thesis}</p>}
            <a href={`https://kalshi.com/markets/${pos.ticker}`} target="_blank" rel="noopener noreferrer"
              className="text-xs text-blue-500 hover:text-blue-400 transition-colors">View on Kalshi</a>
          </div>
        )) : (
          <div className="text-gray-500 text-sm text-center py-8 bg-gray-800 rounded-xl border border-gray-700">No open positions</div>
        )}
      </div>

      <div className="space-y-3">
        <h3 className="text-gray-400 font-semibold text-sm uppercase tracking-wider">Trade History ({trades.length})</h3>
        {trades.length > 0 ? (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-gray-500 text-xs uppercase border-b border-gray-700">
                  <th className="text-left pb-2 pr-3">Date</th>
                  <th className="text-left pb-2 pr-3">Market</th>
                  <th className="text-left pb-2 pr-3">Side</th>
                  <th className="text-right pb-2 pr-3">Cost</th>
                  <th className="text-right pb-2 pr-3">Edge</th>
                  <th className="text-center pb-2 pr-3">Result</th>
                  <th className="text-right pb-2">P&L</th>
                </tr>
              </thead>
              <tbody>
                {trades.map((t, i) => (
                  <tr key={i} className="border-b border-gray-800 hover:bg-gray-800/50">
                    <td className="py-2 pr-3 text-xs text-gray-500 whitespace-nowrap">{t.trade_date}</td>
                    <td className="py-2 pr-3 text-gray-300 text-xs max-w-[200px] truncate">{t.title || t.ticker}</td>
                    <td className="py-2 pr-3">
                      <span className={`text-xs px-1.5 py-0.5 rounded ${
                        t.side === 'yes' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'
                      }`}>{t.side?.toUpperCase()}</span>
                    </td>
                    <td className="py-2 pr-3 text-right font-mono text-gray-300">${(t.cost_dollars || 0).toFixed(2)}</td>
                    <td className="py-2 pr-3 text-right font-mono text-gray-400">{((t.edge || 0) * 100).toFixed(1)}%</td>
                    <td className="py-2 pr-3 text-center">
                      <span className={`text-xs px-1.5 py-0.5 rounded ${
                        t.status === 'resolved'
                          ? t.pnl_dollars > 0 ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'
                          : 'bg-gray-700 text-gray-400'
                      }`}>{t.status === 'resolved' ? (t.resolution || '').toUpperCase() : 'OPEN'}</span>
                    </td>
                    <td className={`py-2 text-right font-mono font-medium ${
                      t.status === 'resolved'
                        ? t.pnl_dollars >= 0 ? 'text-green-400' : 'text-red-400'
                        : 'text-gray-500'
                    }`}>
                      {t.status === 'resolved' ? `${t.pnl_dollars >= 0 ? '+' : ''}$${(t.pnl_dollars || 0).toFixed(2)}` : '--'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ) : (
          <div className="text-gray-500 text-sm text-center py-8 bg-gray-800 rounded-xl border border-gray-700">
            No trades yet. Approve some opportunities to get started.
          </div>
        )}
      </div>
    </div>
  );
}

// ─── CALIBRATION TAB ────────────────────────────────────────────────────────
function CalibrationView({ data }) {
  const perf = data?.performance;
  const trades = data?.trade_history || [];
  const resolved = trades.filter(t => t.status === 'resolved');
  const brier = perf?.brier_score;
  const wins = perf?.wins ?? 0;
  const losses = perf?.losses ?? 0;
  const totalPnl = perf?.total_pnl ?? 0;
  const total = wins + losses;

  return (
    <div className="space-y-6">
      {total === 0 && (
        <div className="bg-blue-900/30 border border-blue-700 rounded-xl p-4 text-center">
          <p className="text-blue-300 text-sm">
            <span className="font-semibold">Collecting data.</span> Calibration metrics will appear as trades resolve.
          </p>
        </div>
      )}

      <div className="flex flex-col sm:flex-row gap-6 items-center justify-center py-4">
        <div className="text-center">
          <div className="relative w-36 h-36 mx-auto">
            <svg viewBox="0 0 100 100" className="w-full h-full -rotate-90">
              <circle cx="50" cy="50" r="42" fill="none" stroke="#374151" strokeWidth="10" />
              <circle cx="50" cy="50" r="42" fill="none"
                stroke={brier != null ? (brier < 0.2 ? '#22c55e' : brier < 0.25 ? '#f59e0b' : '#ef4444') : '#4b5563'}
                strokeWidth="10"
                strokeDasharray={`${brier != null ? (1 - brier) * 263.9 : 0} 263.9`}
                strokeLinecap="round" />
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className="text-3xl font-bold text-gray-100">{brier != null ? brier.toFixed(3) : '--'}</span>
              <span className="text-xs text-gray-500">Brier</span>
            </div>
          </div>
          <p className="text-sm text-gray-400 mt-2">Overall Brier Score</p>
          <p className="text-xs text-gray-500">Lower is better (0 = perfect, 0.25 = coin flip)</p>
        </div>
        <div className="text-sm text-gray-400 space-y-3 max-w-xs">
          <div className="space-y-1 text-xs">
            <div className="flex justify-between gap-4"><span>Expert forecaster</span><span className="text-green-400">~0.15</span></div>
            <div className="flex justify-between gap-4"><span>Good forecaster</span><span className="text-yellow-400">~0.20</span></div>
            <div className="flex justify-between gap-4"><span>Coin flip baseline</span><span className="text-red-400">0.25</span></div>
          </div>
          <div className="border-t border-gray-700 pt-3 space-y-1 text-xs">
            <div className="flex justify-between"><span className="text-gray-400">Resolved trades</span><span className="text-gray-200 font-medium">{total}</span></div>
            <div className="flex justify-between"><span className="text-gray-400">Win rate</span><span className="text-gray-200 font-medium">{total > 0 ? `${((wins/total)*100).toFixed(0)}%` : '--'}</span></div>
            <div className="flex justify-between"><span className="text-gray-400">Realized P&L</span><span className={`font-medium ${totalPnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>{totalPnl !== 0 ? `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}` : '--'}</span></div>
          </div>
        </div>
      </div>

      {resolved.length > 0 && (
        <div className="space-y-2">
          <h3 className="text-gray-400 font-semibold text-sm uppercase tracking-wider">Resolved Predictions</h3>
          <div className="space-y-2">
            {resolved.map((t, i) => {
              const won = t.pnl_dollars > 0;
              return (
                <div key={i} className={`bg-gray-800 rounded-xl border p-3 flex items-center justify-between gap-2 ${
                  won ? 'border-green-800' : 'border-red-800'
                }`}>
                  <div className="flex items-center gap-2 flex-wrap min-w-0">
                    <span className={`px-2 py-0.5 rounded text-xs font-semibold ${won ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}`}>
                      {won ? 'WIN' : 'LOSS'}
                    </span>
                    <span className="text-sm text-gray-300 truncate">{t.title || t.ticker}</span>
                  </div>
                  <span className={`font-mono font-medium text-sm ${won ? 'text-green-400' : 'text-red-400'}`}>
                    {t.pnl_dollars >= 0 ? '+' : ''}${(t.pnl_dollars||0).toFixed(2)}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ROOT APP ───────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('scan');
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [showTokenModal, setShowTokenModal] = useState(false);
  const [token, setToken] = useState(getStoredToken());
  const [endpoint, setEndpoint] = useState(getStoredEndpoint());
  const [decisions, setDecisions] = useState(() => {
    try { return JSON.parse(localStorage.getItem(DECISIONS_STORAGE_KEY) || '{}'); }
    catch { return {}; }
  });

  const focusTicker = useMemo(() => getQueryParam('focus'), []);

  // Refs so async handlers always read the latest values without stale-closure bugs.
  const decisionsRef = useRef(decisions);
  const dataRef = useRef(data);
  const tokenRef = useRef(token);
  const endpointRef = useRef(endpoint);
  useEffect(() => { decisionsRef.current = decisions; }, [decisions]);
  useEffect(() => { dataRef.current = data; }, [data]);
  useEffect(() => { tokenRef.current = token; }, [token]);
  useEffect(() => { endpointRef.current = endpoint; }, [endpoint]);

  const addToast = useCallback((msg, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 5000);
  }, []);

  const persistDecisions = useCallback((d) => {
    try { localStorage.setItem(DECISIONS_STORAGE_KEY, JSON.stringify(d)); } catch {}
  }, []);

  // Approve flow. Receives explicit ticker + side from the card — never relies
  // on a stale opp object. Looks up the latest opportunity from data by ticker
  // for the toast title.
  const handleApprove = useCallback(async (ticker, side, amount) => {
    if (!ticker) {
      addToast('Approve aborted: missing ticker', 'error');
      return;
    }
    const opps = dataRef.current?.opportunities || [];
    const opp = opps.find(o => o.ticker === ticker);
    const title = opp?.title || ticker;

    const tok = tokenRef.current;
    if (!tok) {
      addToast(`No trading token set — approval not sent for ${ticker}`, 'error');
      return;
    }

    addToast(`Placing ${side?.toUpperCase()} ${ticker} for $${amount.toFixed(2)}...`, 'info');
    const result = await executeApproval({
      ticker, side, amount,
      token: tok,
      endpoint: endpointRef.current || DEFAULT_TRADE_ENDPOINT,
    });

    // Functional update prevents stale-closure overwrite if two approvals interleave.
    if (result && result.success) {
      const isDryRun = !!result.dry_run;
      setDecisions(prev => {
        const next = {
          ...prev,
          [ticker]: {
            action: 'approved',
            executed: !isDryRun,
            dry_run: isDryRun,
            amount,
            order_id: result.order_id,
            contracts: result.contracts,
            price_cents: result.price_cents,
            cost_dollars: result.cost_dollars,
            timestamp: new Date().toISOString(),
            title,
          }
        };
        persistDecisions(next);
        return next;
      });
      if (isDryRun) {
        addToast(`DRY RUN logged: ${ticker} (no real order placed)`, 'info');
      } else {
        addToast(`EXECUTED ${ticker}: ${result.contracts ?? '?'} contracts @ ${result.price_cents ?? '?'}c = $${(result.cost_dollars ?? amount).toFixed(2)}`);
      }
    } else {
      const errMsg = (result && result.error) || 'Unknown error';
      setDecisions(prev => {
        const next = {
          ...prev,
          [ticker]: {
            action: 'approved',
            executed: false,
            amount,
            error: errMsg,
            timestamp: new Date().toISOString(),
            title,
          }
        };
        persistDecisions(next);
        return next;
      });
      addToast(`Trade failed for ${ticker}: ${errMsg}`, 'error');
    }
  }, [addToast, persistDecisions]);

  const handleReject = useCallback((ticker) => {
    if (!ticker) return;
    const opps = dataRef.current?.opportunities || [];
    const opp = opps.find(o => o.ticker === ticker);
    setDecisions(prev => {
      const next = {
        ...prev,
        [ticker]: {
          action: 'rejected',
          timestamp: new Date().toISOString(),
          title: opp?.title || ticker,
        }
      };
      persistDecisions(next);
      return next;
    });
    addToast(`Rejected: ${opp?.title || ticker}`, 'info');
  }, [addToast, persistDecisions]);

  const loadData = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch(`dashboard_data.json?t=${Date.now()}`);
      if (res.ok) {
        const json = await res.json();
        setData(json);
        setLastRefresh(json.generated_at || new Date().toISOString());
      }
    } catch {}
    setLoading(false);
  }, []);

  useEffect(() => {
    loadData();
    const interval = setInterval(loadData, 60000);
    return () => clearInterval(interval);
  }, [loadData]);

  const onSaveToken = (newToken, newEndpoint) => {
    setToken(newToken);
    setEndpoint(newEndpoint);
    setStoredToken(newToken);
    setStoredEndpoint(newEndpoint);
    setShowTokenModal(false);
    if (newToken) addToast('Token saved — live trading enabled');
    else addToast('Token cleared — view-only mode', 'info');
  };

  const tabs = [
    { id: 'scan', label: 'Scan' },
    { id: 'positions', label: 'Positions' },
    { id: 'calibration', label: 'Calibration' },
  ];

  return (
    <div className="min-h-screen bg-gray-900 text-gray-100">
      <ToastContainer toasts={toasts} />
      <TokenModal
        open={showTokenModal}
        currentToken={token}
        currentEndpoint={endpoint}
        onSave={onSaveToken}
        onCancel={() => setShowTokenModal(false)}
      />
      {/* Header */}
      <div className="sticky top-0 z-40 bg-gray-900 border-b border-gray-800 px-4 py-3">
        <div className="max-w-4xl mx-auto flex items-center justify-between">
          <div className="flex items-center gap-2 min-w-0">
            <div className={`w-2 h-2 rounded-full ${data ? 'bg-green-400' : 'bg-gray-500'} live-dot flex-shrink-0`} />
            <span className="font-semibold text-gray-100 truncate">Kalshi Prediction Bot</span>
            <span className="text-gray-600 text-xs hidden sm:inline">/ $100 portfolio</span>
            <ConnectionBadge hasToken={!!token} />
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => setShowTokenModal(true)}
              className={`text-xs px-2 py-1 rounded transition-colors ${
                token
                  ? 'bg-gray-800 hover:bg-gray-700 text-gray-300'
                  : 'bg-blue-900 hover:bg-blue-800 text-blue-200 border border-blue-700'
              }`}>
              {token ? 'Token Set' : 'Set Token'}
            </button>
            <span className="text-xs text-gray-500 hidden sm:inline">{lastRefresh ? timeAgo(lastRefresh) : ''}</span>
            <button onClick={loadData}
              className="text-xs text-gray-500 hover:text-gray-300 transition-colors px-2 py-1 rounded bg-gray-800 hover:bg-gray-700">
              {loading ? '...' : '↻'}
            </button>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="sticky top-14 z-30 bg-gray-900 border-b border-gray-800">
        <div className="max-w-4xl mx-auto flex">
          {tabs.map(t => (
            <button key={t.id}
              onClick={() => setTab(t.id)}
              className={`px-4 py-3 text-sm font-medium transition-colors ${
                tab === t.id ? 'text-blue-400 border-b-2 border-blue-400' : 'text-gray-500 hover:text-gray-300'
              }`}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div className="max-w-4xl mx-auto px-4 py-6 space-y-6">
        <AccountOverview data={data} />
        {tab === 'scan' && (
          <ScanView data={data} decisions={decisions}
            onApprove={handleApprove} onReject={handleReject}
            focusTicker={focusTicker} hasToken={!!token} />
        )}
        {tab === 'positions' && <PositionsView data={data} />}
        {tab === 'calibration' && <CalibrationView data={data} />}
      </div>

      <div className="text-center text-xs text-gray-600 py-6 border-t border-gray-800">
        Kalshi Prediction Bot — AI Scan / News Context / Red Team / You Approve / Auto Execute
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
