<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalshi Prediction Bot</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dash-bg': '#0f1117',
            'dash-card': '#1a1d2e',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f1117; color: #f3f4f6; font-family: 'Inter', system-ui, sans-serif; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .live-dot { animation: pulse-dot 1.5s infinite; }
    .card-expand { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .card-expand.open { max-height: 2000px; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    @keyframes spin-fast { to { transform: rotate(360deg); } }
    .spinner { animation: spin-fast 0.8s linear infinite; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── TRADE EXECUTION ──────────────────────────────────────────
// Detects if approval server is running on localhost:5050
// If yes: clicking Approve places a REAL trade on Kalshi
// If no: falls back to localStorage-only (view mode)
const API_BASE = window.location.hostname === "localhost" ? "" : null;

async function executeApproval(ticker, side, amount) {
  if (!API_BASE && API_BASE !== "") {
    return { success: false, error: "Not connected to approval server. Run approval_server.py locally." };
  }
  try {
    const res = await fetch(`${API_BASE}/api/approve`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ticker, side, amount }),
    });
    return await res.json();
  } catch (e) {
    return { success: false, error: `Server connection failed: ${e.message}` };
  }
}

// ─── DATA LOADING ──────────────────────────────────────────────
function timeAgo(isoStr) {
  if (!isoStr) return "never";
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 0) return "just now";
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

// ─── TOAST ──────────────────────────────────────────────────────
function ToastContainer({ toasts }) {
  return (
    <div className="fixed bottom-4 right-4 z-50 space-y-2 pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`px-4 py-3 rounded-xl shadow-xl text-sm font-medium max-w-xs border ${
          t.type === 'error'  ? 'bg-red-900 text-red-200 border-red-700' :
          t.type === 'info'   ? 'bg-blue-900 text-blue-200 border-blue-700' :
                                'bg-green-900 text-green-200 border-green-700'
        }`}>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

// ─── CONNECTION STATUS ───────────────────────────────────────────
function ConnectionBadge() {
  const isLocal = API_BASE !== null;
  return (
    <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${
      isLocal
        ? 'bg-green-900 text-green-300 border border-green-700'
        : 'bg-gray-800 text-gray-500 border border-gray-700'
    }`}>
      {isLocal ? 'LIVE TRADING' : 'VIEW ONLY'}
    </span>
  );
}

// ─── ACCOUNT OVERVIEW ────────────────────────────────────────────
function AccountOverview({ data }) {
  const balance = data?.balance ?? 0;
  const positions = data?.positions ?? [];
  const totalCost = positions.reduce((s, p) => s + (p.cost_dollars || 0), 0);
  const totalPnl = data?.total_pnl ?? 0;
  const openCount = positions.length;
  return (
    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
      <div className="bg-gray-800 rounded-xl border border-gray-700 p-4 text-center">
        <div className="text-2xl font-bold text-green-400">${balance.toFixed(2)}</div>
        <div className="text-xs text-gray-500 mt-1">Available Cash</div>
      </div>
      <div className="bg-gray-800 rounded-xl border border-gray-700 p-4 text-center">
        <div className="text-2xl font-bold text-blue-400">${totalCost.toFixed(2)}</div>
        <div className="text-xs text-gray-500 mt-1">In Positions</div>
      </div>
      <div className="bg-gray-800 rounded-xl border border-gray-700 p-4 text-center">
        <div className="text-2xl font-bold text-gray-100">{openCount}</div>
        <div className="text-xs text-gray-500 mt-1">Open Positions</div>
      </div>
      <div className="bg-gray-800 rounded-xl border border-gray-700 p-4 text-center">
        <div className={`text-2xl font-bold ${totalPnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
          {totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(2)}
        </div>
        <div className="text-xs text-gray-500 mt-1">Realized P&L</div>
      </div>
    </div>
  );
}

// ─── OPPORTUNITY CARD ───────────────────────────────────────────
function OpportunityCard({ opp, onApprove, onReject, decisions }) {
  const [amount, setAmount] = useState(opp.suggested_size || 5);
  const [expanded, setExpanded] = useState(false);
  const [executing, setExecuting] = useState(false);
  const decided = decisions[opp.ticker];

  if (decided) {
    return (
      <div className={`bg-gray-800 rounded-xl border p-3 space-y-1 ${
        decided.action === 'approved' ? 'border-green-800' : 'border-red-800'
      }`}>
        <div className="flex items-center justify-between gap-2">
          <div className="flex items-center gap-2 flex-wrap min-w-0">
            <span className={`px-2 py-0.5 rounded text-xs font-semibold border ${
              decided.action === 'approved'
                ? 'bg-green-900 text-green-300 border-green-700'
                : 'bg-red-900 text-red-300 border-red-700'
            }`}>
              {decided.action === 'approved' ? (decided.executed ? 'EXECUTED' : 'APPROVED') : 'REJECTED'}
            </span>
            <span className="font-mono text-sm text-gray-300 truncate">{opp.title || opp.ticker}</span>
            {decided.action === 'approved' && (
              <span className="text-sm font-semibold text-green-400">${decided.amount}</span>
            )}
          </div>
          <span className="text-xs text-gray-600 whitespace-nowrap flex-shrink-0">
            {new Date(decided.timestamp).toLocaleTimeString()}
          </span>
        </div>
        {decided.order_id && (
          <div className="text-xs text-gray-500">
            Order: <span className="font-mono text-gray-400">{decided.order_id}</span>
            {decided.contracts && <span> | {decided.contracts} contracts @ {decided.price_cents}c = ${decided.cost_dollars?.toFixed(2)}</span>}
          </div>
        )}
        {decided.error && (
          <div className="text-xs text-red-400">Error: {decided.error}</div>
        )}
      </div>
    );
  }

  const edgePct = (opp.edge * 100).toFixed(1);
  const aiPct = (opp.ai_prob * 100).toFixed(0);
  const mktPct = (opp.market_prob * 100).toFixed(0);
  const isLive = API_BASE !== null;

  return (
    <div className="bg-gray-800 rounded-xl border border-yellow-700 overflow-hidden">
      <div className="p-4 space-y-3">
        {/* Header */}
        <div className="flex items-start justify-between gap-2">
          <div className="space-y-1 flex-1 min-w-0">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="w-2 h-2 rounded-full bg-yellow-400 live-dot flex-shrink-0" />
              <span className="font-medium text-gray-100 text-sm">{opp.title || opp.ticker}</span>
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              <span className="font-mono text-xs text-gray-500">{opp.ticker}</span>
              <span className={`text-xs px-2 py-0.5 rounded font-semibold border ${
                opp.side === 'yes'
                  ? 'bg-green-900 text-green-300 border-green-700'
                  : 'bg-red-900 text-red-300 border-red-700'
              }`}>
                BUY {opp.side.toUpperCase()}
              </span>
              <span className={`text-xs px-1.5 py-0.5 rounded ${
                opp.confidence === 'high' ? 'bg-green-900 text-green-300' :
                opp.confidence === 'medium' ? 'bg-yellow-900 text-yellow-300' :
                'bg-gray-700 text-gray-400'
              }`}>
                {opp.confidence}
              </span>
              {opp.related_count > 0 && (
                <span className="text-xs px-1.5 py-0.5 rounded bg-purple-900 text-purple-300">
                  +{opp.related_count} related
                </span>
              )}
            </div>
          </div>
          <div className="text-right flex-shrink-0 pl-2">
            <div className="text-2xl font-bold text-yellow-400">{edgePct}%</div>
            <div className="text-xs text-gray-500">edge</div>
          </div>
        </div>

        {/* Probability comparison */}
        <div className="bg-gray-900 rounded-lg p-3 space-y-2">
          <div className="flex items-center justify-between text-sm">
            <span className="text-gray-400">AI estimate</span>
            <span className="font-mono font-bold text-blue-400">{aiPct}%</span>
          </div>
          <div className="relative h-2 bg-gray-700 rounded-full overflow-hidden">
            <div className="absolute h-full bg-blue-500 rounded-full" style={{width: `${aiPct}%`}} />
            <div className="absolute h-full w-0.5 bg-red-400" style={{left: `${mktPct}%`}} title="Market price" />
          </div>
          <div className="flex items-center justify-between text-xs text-gray-500">
            <span>Market: {mktPct}%</span>
            <span>AI sees {edgePct}% mispricing</span>
          </div>
        </div>

        {/* Red team flaw */}
        {opp.red_team_flaw && (
          <div className="bg-red-950 border border-red-900 rounded-lg p-3">
            <div className="text-xs text-red-500 uppercase font-semibold mb-1">Red Team Challenge ({opp.red_team_strength})</div>
            <p className="text-red-300 text-xs leading-relaxed">{opp.red_team_flaw}</p>
          </div>
        )}

        {/* Thesis toggle */}
        <button
          onClick={() => setExpanded(!expanded)}
          className="text-xs text-blue-400 hover:text-blue-300 transition-colors"
        >
          {expanded ? '- Hide reasoning' : '+ Show AI reasoning'}
        </button>
        <div className={`card-expand ${expanded ? 'open' : ''}`}>
          <div className="space-y-3 pt-1">
            {opp.thesis && (
              <div>
                <div className="text-xs text-green-500 uppercase font-semibold mb-1">Thesis</div>
                <p className="text-gray-300 text-sm leading-relaxed">{opp.thesis}</p>
              </div>
            )}
            {opp.counter_thesis && (
              <div>
                <div className="text-xs text-red-500 uppercase font-semibold mb-1">Counter-thesis</div>
                <p className="text-gray-400 text-sm leading-relaxed">{opp.counter_thesis}</p>
              </div>
            )}
            {opp.reasoning && (
              <div>
                <div className="text-xs text-gray-500 uppercase font-semibold mb-1">Full reasoning</div>
                <p className="text-gray-400 text-xs leading-relaxed">{opp.reasoning}</p>
              </div>
            )}
          </div>
        </div>

        {/* Sizing + actions */}
        <div className="bg-gray-900 rounded-lg p-3 space-y-3">
          <div className="text-xs text-gray-400">
            Quarter-Kelly suggested: <span className="text-gray-200 font-semibold">${opp.suggested_size || 5}</span>
            <span className="text-gray-600 mx-2">|</span>
            Max: <span className="text-gray-200 font-semibold">$10</span>
          </div>
          <div className="flex items-center gap-2">
            <span className="text-xs text-gray-400">Amount:</span>
            <button onClick={() => setAmount(a => Math.max(0.5, +(a - 0.5).toFixed(2)))}
              className="w-8 h-8 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-200 text-lg font-bold flex items-center justify-center">-</button>
            <div className="flex items-center bg-gray-700 border border-gray-600 rounded-lg overflow-hidden">
              <span className="pl-2 text-gray-400 text-sm">$</span>
              <input type="number" value={amount} step="0.50" min="0.50" max="10"
                onChange={e => { const n = parseFloat(e.target.value); if (!isNaN(n) && n >= 0) setAmount(n); }}
                onBlur={() => { if (amount < 0.5) setAmount(0.5); if (amount > 10) setAmount(10); }}
                className="w-16 h-8 pr-2 bg-transparent text-gray-100 text-center text-sm font-medium focus:outline-none" />
            </div>
            <button onClick={() => setAmount(a => Math.min(10, +(a + 0.5).toFixed(2)))}
              className="w-8 h-8 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-200 text-lg font-bold flex items-center justify-center">+</button>
          </div>
        </div>

        <div className="flex gap-2">
          <button onClick={() => { setExecuting(true); onApprove(opp, amount).finally(() => setExecuting(false)); }}
            disabled={executing}
            className={`flex-1 py-3 rounded-xl font-bold text-sm transition-colors flex items-center justify-center gap-2 ${
              executing
                ? 'bg-gray-700 text-gray-400 cursor-wait'
                : 'bg-green-600 hover:bg-green-500 text-white'
            }`}>
            {executing ? (
              <>
                <svg className="w-4 h-4 spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" strokeWidth="3" strokeDasharray="32 32" /></svg>
                Placing Trade...
              </>
            ) : (
              isLive ? `Execute $${amount} Trade` : `Approve $${amount} Trade`
            )}
          </button>
          <button onClick={() => onReject(opp)}
            className="px-4 py-3 rounded-xl font-semibold text-sm bg-red-900 hover:bg-red-800 text-red-300 border border-red-800 transition-colors">
            Reject
          </button>
        </div>

        {!isLive && (
          <div className="text-center text-xs text-gray-600">
            Run <code className="bg-gray-900 px-1 py-0.5 rounded text-gray-500">python3 approval_server.py</code> to enable live trading
          </div>
        )}

        <a href={`https://kalshi.com/markets/${opp.ticker}`} target="_blank" rel="noopener noreferrer"
          className="block text-center text-xs text-gray-600 hover:text-gray-400 transition-colors">
          View on Kalshi
        </a>
      </div>
    </div>
  );
}

// ─── SCAN TAB ────────────────────────────────────────────────────
function ScanView({ data, decisions, onApprove, onReject }) {
  const scan = data?.latest_scan;
  const opportunities = data?.opportunities || [];
  const pendingCount = opportunities.filter(o => !decisions[o.ticker]).length;
  const approvedCount = opportunities.filter(o => decisions[o.ticker]?.action === 'approved').length;
  const rejectedCount = opportunities.filter(o => decisions[o.ticker]?.action === 'rejected').length;

  return (
    <div className="space-y-6">
      {/* Scan summary */}
      <div className="bg-gray-800 rounded-xl border border-gray-700 p-4 space-y-3">
        <div className="flex items-center justify-between">
          <h3 className="text-blue-400 font-semibold text-sm uppercase tracking-wider">Latest Scan</h3>
          <span className="text-xs text-gray-500">{scan?.timestamp ? timeAgo(scan.timestamp) : 'No scan yet'}</span>
        </div>
        {scan ? (
          <div className="grid grid-cols-3 gap-3 text-center">
            <div>
              <div className="text-lg font-bold text-gray-100">{scan.markets_pulled || 0}</div>
              <div className="text-xs text-gray-500">Markets Scanned</div>
            </div>
            <div>
              <div className="text-lg font-bold text-gray-100">{scan.markets_analyzed || 0}</div>
              <div className="text-xs text-gray-500">AI Analyzed</div>
            </div>
            <div>
              <div className="text-lg font-bold text-yellow-400">{opportunities.length}</div>
              <div className="text-xs text-gray-500">Opportunities</div>
            </div>
          </div>
        ) : (
          <p className="text-gray-500 text-sm text-center py-4">
            Run <code className="bg-gray-900 px-1.5 py-0.5 rounded text-xs">python3 kalshi_predictor.py dry-run</code> to generate your first scan
          </p>
        )}
      </div>

      {/* Decision summary */}
      {opportunities.length > 0 && (
        <div className="flex gap-3 text-xs">
          {pendingCount > 0 && (
            <span className="px-2 py-1 rounded bg-yellow-900 text-yellow-300 font-semibold">
              {pendingCount} pending your review
            </span>
          )}
          {approvedCount > 0 && (
            <span className="px-2 py-1 rounded bg-green-900 text-green-300">
              {approvedCount} executed
            </span>
          )}
          {rejectedCount > 0 && (
            <span className="px-2 py-1 rounded bg-red-900 text-red-300">
              {rejectedCount} rejected
            </span>
          )}
        </div>
      )}

      {/* Opportunity cards */}
      {opportunities.length > 0 ? (
        <div className="space-y-3">
          <h3 className="text-yellow-400 font-semibold text-sm uppercase tracking-wider flex items-center gap-2">
            <span className="w-2 h-2 rounded-full bg-yellow-400 live-dot" />
            Opportunities ({opportunities.length})
          </h3>
          {opportunities.map(opp => (
            <OpportunityCard
              key={opp.ticker}
              opp={opp}
              decisions={decisions}
              onApprove={onApprove}
              onReject={onReject}
            />
          ))}
        </div>
      ) : scan ? (
        <div className="text-gray-500 text-sm text-center py-8 bg-gray-800 rounded-xl border border-gray-700">
          No opportunities found in latest scan. The AI didn't find any markets mispriced by more than 10%.
        </div>
      ) : null}
    </div>
  );
}

// ─── POSITIONS TAB ───────────────────────────────────────────────
function PositionsView({ data }) {
  const positions = data?.positions || [];
  const trades = data?.trade_history || [];
  return (
    <div className="space-y-6">
      <div className="space-y-3">
        <h3 className="text-gray-400 font-semibold text-sm uppercase tracking-wider">
          Open Positions ({positions.length})
        </h3>
        {positions.length > 0 ? positions.map((pos, i) => (
          <div key={pos.ticker + i} className="bg-gray-800 rounded-xl border border-gray-700 p-4 space-y-2">
            <div className="flex items-start justify-between gap-2">
              <div className="space-y-1 flex-1 min-w-0">
                <div className="font-medium text-gray-100 text-sm">{pos.title || pos.ticker}</div>
                <div className="flex items-center gap-2 flex-wrap text-xs">
                  <span className="font-mono text-gray-500">{pos.ticker}</span>
                  <span className={`px-1.5 py-0.5 rounded ${
                    pos.side === 'yes' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'
                  }`}>{pos.side?.toUpperCase()}</span>
                  <span className="text-gray-400">x{pos.contracts} @ {pos.price_cents}c</span>
                </div>
              </div>
              <div className="text-right flex-shrink-0">
                <div className="text-sm font-semibold text-gray-200">${(pos.cost_dollars || 0).toFixed(2)}</div>
                <div className="text-xs text-gray-500">cost</div>
              </div>
            </div>
            <div className="flex items-center justify-between text-xs text-gray-500">
              <span>AI: {((pos.ai_probability || 0) * 100).toFixed(0)}% | Mkt: {((pos.market_probability || 0) * 100).toFixed(0)}%</span>
              <span>Edge: {((pos.edge || 0) * 100).toFixed(1)}%</span>
            </div>
            {pos.thesis && <p className="text-xs text-gray-400 leading-relaxed">{pos.thesis}</p>}
            <a href={`https://kalshi.com/markets/${pos.ticker}`} target="_blank" rel="noopener noreferrer"
              className="text-xs text-blue-500 hover:text-blue-400 transition-colors">View on Kalshi</a>
          </div>
        )) : (
          <div className="text-gray-500 text-sm text-center py-8 bg-gray-800 rounded-xl border border-gray-700">No open positions</div>
        )}
      </div>

      <div className="space-y-3">
        <h3 className="text-gray-400 font-semibold text-sm uppercase tracking-wider">Trade History ({trades.length})</h3>
        {trades.length > 0 ? (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-gray-500 text-xs uppercase border-b border-gray-700">
                  <th className="text-left pb-2 pr-3">Date</th>
                  <th className="text-left pb-2 pr-3">Market</th>
                  <th className="text-left pb-2 pr-3">Side</th>
                  <th className="text-right pb-2 pr-3">Cost</th>
                  <th className="text-right pb-2 pr-3">Edge</th>
                  <th className="text-center pb-2 pr-3">Result</th>
                  <th className="text-right pb-2">P&L</th>
                </tr>
              </thead>
              <tbody>
                {trades.map((t, i) => (
                  <tr key={i} className="border-b border-gray-800 hover:bg-gray-800/50">
                    <td className="py-2 pr-3 text-xs text-gray-500 whitespace-nowrap">{t.trade_date}</td>
                    <td className="py-2 pr-3 text-gray-300 text-xs max-w-[200px] truncate">{t.title || t.ticker}</td>
                    <td className="py-2 pr-3">
                      <span className={`text-xs px-1.5 py-0.5 rounded ${
                        t.side === 'yes' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'
                      }`}>{t.side?.toUpperCase()}</span>
                    </td>
                    <td className="py-2 pr-3 text-right font-mono text-gray-300">${(t.cost_dollars || 0).toFixed(2)}</td>
                    <td className="py-2 pr-3 text-right font-mono text-gray-400">{((t.edge || 0) * 100).toFixed(1)}%</td>
                    <td className="py-2 pr-3 text-center">
                      <span className={`text-xs px-1.5 py-0.5 rounded ${
                        t.status === 'resolved'
                          ? t.pnl_dollars > 0 ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'
                          : 'bg-gray-700 text-gray-400'
                      }`}>{t.status === 'resolved' ? (t.resolution || '').toUpperCase() : 'OPEN'}</span>
                    </td>
                    <td className={`py-2 text-right font-mono font-medium ${
                      t.status === 'resolved'
                        ? t.pnl_dollars >= 0 ? 'text-green-400' : 'text-red-400'
                        : 'text-gray-500'
                    }`}>
                      {t.status === 'resolved' ? `${t.pnl_dollars >= 0 ? '+' : ''}$${(t.pnl_dollars || 0).toFixed(2)}` : '--'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ) : (
          <div className="text-gray-500 text-sm text-center py-8 bg-gray-800 rounded-xl border border-gray-700">
            No trades yet. Approve some opportunities to get started.
          </div>
        )}
      </div>
    </div>
  );
}

// ─── CALIBRATION TAB ─────────────────────────────────────────────
function CalibrationView({ data }) {
  const perf = data?.performance;
  const trades = data?.trade_history || [];
  const resolved = trades.filter(t => t.status === 'resolved');
  const brier = perf?.brier_score;
  const wins = perf?.wins ?? 0;
  const losses = perf?.losses ?? 0;
  const totalPnl = perf?.total_pnl ?? 0;
  const total = wins + losses;

  return (
    <div className="space-y-6">
      {total === 0 && (
        <div className="bg-blue-900/30 border border-blue-700 rounded-xl p-4 text-center">
          <p className="text-blue-300 text-sm">
            <span className="font-semibold">Collecting data.</span> Calibration metrics will appear as trades resolve.
          </p>
        </div>
      )}

      <div className="flex flex-col sm:flex-row gap-6 items-center justify-center py-4">
        <div className="text-center">
          <div className="relative w-36 h-36 mx-auto">
            <svg viewBox="0 0 100 100" className="w-full h-full -rotate-90">
              <circle cx="50" cy="50" r="42" fill="none" stroke="#374151" strokeWidth="10" />
              <circle cx="50" cy="50" r="42" fill="none"
                stroke={brier != null ? (brier < 0.2 ? '#22c55e' : brier < 0.25 ? '#f59e0b' : '#ef4444') : '#4b5563'}
                strokeWidth="10"
                strokeDasharray={`${brier != null ? (1 - brier) * 263.9 : 0} 263.9`}
                strokeLinecap="round" />
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className="text-3xl font-bold text-gray-100">{brier != null ? brier.toFixed(3) : '--'}</span>
              <span className="text-xs text-gray-500">Brier</span>
            </div>
          </div>
          <p className="text-sm text-gray-400 mt-2">Overall Brier Score</p>
          <p className="text-xs text-gray-500">Lower is better (0 = perfect, 0.25 = coin flip)</p>
        </div>
        <div className="text-sm text-gray-400 space-y-3 max-w-xs">
          <div className="space-y-1 text-xs">
            <div className="flex justify-between gap-4"><span>Expert forecaster</span><span className="text-green-400">~0.15</span></div>
            <div className="flex justify-between gap-4"><span>Good forecaster</span><span className="text-yellow-400">~0.20</span></div>
            <div className="flex justify-between gap-4"><span>Coin flip baseline</span><span className="text-red-400">0.25</span></div>
          </div>
          <div className="border-t border-gray-700 pt-3 space-y-1 text-xs">
            <div className="flex justify-between"><span className="text-gray-400">Resolved trades</span><span className="text-gray-200 font-medium">{total}</span></div>
            <div className="flex justify-between"><span className="text-gray-400">Win rate</span><span className="text-gray-200 font-medium">{total > 0 ? `${((wins/total)*100).toFixed(0)}%` : '--'}</span></div>
            <div className="flex justify-between"><span className="text-gray-400">Realized P&L</span><span className={`font-medium ${totalPnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>{totalPnl !== 0 ? `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}` : '--'}</span></div>
          </div>
        </div>
      </div>

      {resolved.length > 0 && (
        <div className="space-y-2">
          <h3 className="text-gray-400 font-semibold text-sm uppercase tracking-wider">Resolved Predictions</h3>
          <div className="space-y-2">
            {resolved.map((t, i) => {
              const won = t.pnl_dollars > 0;
              return (
                <div key={i} className={`bg-gray-800 rounded-xl border p-3 flex items-center justify-between gap-2 ${
                  won ? 'border-green-800' : 'border-red-800'
                }`}>
                  <div className="flex items-center gap-2 flex-wrap min-w-0">
                    <span className={`px-2 py-0.5 rounded text-xs font-semibold ${won ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}`}>
                      {won ? 'WIN' : 'LOSS'}
                    </span>
                    <span className="text-sm text-gray-300 truncate">{t.title || t.ticker}</span>
                  </div>
                  <span className={`font-mono font-medium text-sm ${won ? 'text-green-400' : 'text-red-400'}`}>
                    {t.pnl_dollars >= 0 ? '+' : ''}${(t.pnl_dollars||0).toFixed(2)}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ROOT APP ────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('scan');
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [decisions, setDecisions] = useState(() => {
    try { return JSON.parse(localStorage.getItem('kalshi_bot_decisions_v4') || '{}'); }
    catch { return {}; }
  });

  const addToast = (msg, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 5000);
  };

  const persistDecisions = useCallback((d) => {
    try { localStorage.setItem('kalshi_bot_decisions_v4', JSON.stringify(d)); } catch {}
  }, []);

  const handleApprove = async (opp, amount) => {
    const isLive = API_BASE !== null;

    if (isLive) {
      // LIVE MODE: Place real trade via approval server
      addToast(`Placing trade: ${opp.side.toUpperCase()} ${opp.ticker} for $${amount}...`, 'info');
      const result = await executeApproval(opp.ticker, opp.side, amount);

      if (result.success) {
        const next = {
          ...decisions,
          [opp.ticker]: {
            action: 'approved',
            executed: true,
            amount,
            order_id: result.order_id,
            contracts: result.contracts,
            price_cents: result.price_cents,
            cost_dollars: result.cost_dollars,
            timestamp: new Date().toISOString(),
            opp,
          }
        };
        setDecisions(next);
        persistDecisions(next);
        addToast(`TRADE EXECUTED: ${result.contracts} contracts of ${opp.ticker} @ ${result.price_cents}c ($${result.cost_dollars.toFixed(2)})`);
      } else {
        const next = {
          ...decisions,
          [opp.ticker]: {
            action: 'approved',
            executed: false,
            amount,
            error: result.error,
            timestamp: new Date().toISOString(),
          }
        };
        setDecisions(next);
        persistDecisions(next);
        addToast(`Trade failed: ${result.error}`, 'error');
      }
    } else {
      // VIEW MODE: Just record locally
      const next = { ...decisions, [opp.ticker]: { action: 'approved', amount, timestamp: new Date().toISOString(), opp } };
      setDecisions(next);
      persistDecisions(next);
      addToast(`Approved: ${opp.title || opp.ticker} for $${amount} (not connected — start approval_server.py to execute)`);
    }
  };

  const handleReject = (opp) => {
    const next = { ...decisions, [opp.ticker]: { action: 'rejected', timestamp: new Date().toISOString() } };
    setDecisions(next);
    persistDecisions(next);
    addToast(`Rejected: ${opp.title || opp.ticker}`, 'info');
  };

  const loadData = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch(`dashboard_data.json?t=${Date.now()}`);
      if (res.ok) {
        const json = await res.json();
        setData(json);
        setLastRefresh(json.generated_at || new Date().toISOString());
      }
    } catch {}
    setLoading(false);
  }, []);

  useEffect(() => {
    loadData();
    const interval = setInterval(loadData, 60000);
    return () => clearInterval(interval);
  }, [loadData]);

  const tabs = [
    { id: 'scan', label: 'Scan', icon: '' },
    { id: 'positions', label: 'Positions', icon: '' },
    { id: 'calibration', label: 'Calibration', icon: '' },
  ];

  return (
    <div className="min-h-screen bg-gray-900 text-gray-100">
      <ToastContainer toasts={toasts} />
      {/* Header */}
      <div className="sticky top-0 z-50 bg-gray-900 border-b border-gray-800 px-4 py-3">
        <div className="max-w-4xl mx-auto flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className={`w-2 h-2 rounded-full ${data ? 'bg-green-400' : 'bg-gray-500'} live-dot`} />
            <span className="font-semibold text-gray-100">Kalshi Prediction Bot</span>
            <span className="text-gray-600 text-xs hidden sm:inline">/ $100 portfolio</span>
            <ConnectionBadge />
          </div>
          <div className="flex items-center gap-3">
            <span className="text-xs text-gray-500">{lastRefresh ? timeAgo(lastRefresh) : ''}</span>
            <button onClick={loadData}
              className="text-xs text-gray-500 hover:text-gray-300 transition-colors px-2 py-1 rounded bg-gray-800 hover:bg-gray-700">
              {loading ? 'loading...' : 'refresh'}
            </button>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="sticky top-14 z-40 bg-gray-900 border-b border-gray-800">
        <div className="max-w-4xl mx-auto flex">
          {tabs.map(t => (
            <button key={t.id}
              onClick={() => setTab(t.id)}
              className={`px-4 py-3 text-sm font-medium transition-colors ${
                tab === t.id ? 'text-blue-400 border-b-2 border-blue-400' : 'text-gray-500 hover:text-gray-300'
              }`}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div className="max-w-4xl mx-auto px-4 py-6 space-y-6">
        <AccountOverview data={data} />
        {tab === 'scan' && (
          <ScanView data={data} decisions={decisions} onApprove={handleApprove} onReject={handleReject} />
        )}
        {tab === 'positions' && <PositionsView data={data} />}
        {tab === 'calibration' && <CalibrationView data={data} />}
      </div>

      <div className="text-center text-xs text-gray-600 py-6 border-t border-gray-800">
        Kalshi Prediction Bot — AI Scan / News Context / Red Team / You Approve / Auto Execute
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
