// ─── HELPERS ─────────────────────────────────────────────────────────────────
function timeAgo(isoStr) {
  if (!isoStr) return "unknown";
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function directionColor(d) {
  if (!d) return "text-gray-400";
  const dl = d.toLowerCase();
  if (dl === "bullish" || dl === "positive" || dl === "confirmed") return "text-green-400";
  if (dl === "bearish" || dl === "negative") return "text-red-400";
  if (dl === "neutral" || dl === "mixed") return "text-yellow-400";
  return "text-blue-400";
}

function directionBg(d) {
  if (!d) return "bg-gray-700";
  const dl = d.toLowerCase();
  if (dl === "bullish" || dl === "positive" || dl === "confirmed") return "bg-green-900 text-green-300 border border-green-700";
  if (dl === "bearish" || dl === "negative") return "bg-red-900 text-red-300 border border-red-700";
  if (dl === "neutral" || dl === "mixed") return "bg-yellow-900 text-yellow-300 border border-yellow-700";
  return "bg-blue-900 text-blue-300 border border-blue-700";
}

function sentimentBg(s) {
  if (!s) return "bg-gray-700 text-gray-300";
  const sl = s.toLowerCase();
  if (sl === "negative") return "bg-red-900 text-red-300";
  if (sl === "confirmed" || sl === "positive") return "bg-green-900 text-green-300";
  return "bg-yellow-900 text-yellow-300";
}

function healthColor(v) {
  if (v >= 75) return "#22c55e";
  if (v >= 50) return "#f59e0b";
  return "#ef4444";
}

function formatSector(s) {
  return s.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

// ─── SPARKLINE ───────────────────────────────────────────────────────────────
function Sparkline({ data, width = 80, height = 30 }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg width={width} height={height} className="inline-block">
      <polyline points={pts} className="sparkline-path" />
    </svg>
  );
}

}

          {i < chain.length - 1 && <span className="text-gray-500 text-xs">→</span>}

    </div>
  );
}

const SAMPLE_TRADE_IDS = new Set(["th-001", "th-002", "th-003"]);

function TradeCommand({ thesisData }) {
  const data = thesisData || SAMPLE_THESIS_DASHBOARD;
  const [toasts, setToasts] = useState([]);
  const [fileHandle, setFileHandle] = useState(null);
  const [decisions, setDecisions] = useState(() => {
    try {
      const saved = localStorage.getItem('kalshi_decisions_v2');
      if (!saved) return { opened: [], executed: [], skipped: [], rejected: [] };
      const parsed = JSON.parse(saved);
      // Filter out sample trade IDs so they always reappear as pending
      return {
        opened:   (parsed.opened   || []).filter(d => !SAMPLE_TRADE_IDS.has(d.id)),
        executed: (parsed.executed || []).filter(d => !SAMPLE_TRADE_IDS.has(d.id)),
        skipped:  (parsed.skipped  || []).filter(d => !SAMPLE_TRADE_IDS.has(d.id)),
        rejected: (parsed.rejected || []).filter(d => !SAMPLE_TRADE_IDS.has(d.id)),
      };
    } catch(e) { return { opened: [], executed: [], skipped: [], rejected: [] }; }
  });

  const [apiConnected, setApiConnected] = useState(false);
  const [apiPending, setApiPending] = useState(null);
  const [confirmTrade, setConfirmTrade] = useState(null); // {approval, amount}
  const [executing, setExecuting] = useState(false);

  // Clean up old localStorage keys from prior versions
  useEffect(() => {
    try {
      localStorage.removeItem('kalshi_decisions');
      localStorage.removeItem('kalshi_trade_decisions');
    } catch(e) {}
  }, []);

  useEffect(() => {
    const pollPending = async () => {
      try {
        const res = await fetch(`${API_BASE}/api/pending`, {
          signal: AbortSignal.timeout(3000),
        });
        if (res.ok) {
          const json = await res.json();
          setApiPending(json.pending_approvals || []);
          setApiConnected(true);
        }
      } catch (e) {
        setApiConnected(false);
      }
    };
    pollPending();
    const interval = setInterval(pollPending, 15000);
    return () => clearInterval(interval);
  }, []);

  const addToast = (msg, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
  };

  const connectFile = async () => {
    if (!('showOpenFilePicker' in window)) {
      addToast('File System API not available — decisions saved to browser storage only.', 'info');
      return;
    }
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }],
        multiple: false
      });
      const file = await handle.getFile();
      const text = await file.text();
      let existing = [];
      try { existing = JSON.parse(text || '[]'); } catch(e) {}
      setFileHandle(handle);
      addToast('Connected: ' + handle.name + (existing.length ? ' (' + existing.length + ' existing entries)' : ''), 'info');
    } catch(e) {
      if (e.name !== 'AbortError') addToast('Could not connect file: ' + e.message, 'error');
    }
  };

  const persistDecisions = async (newDecisions, handle) => {
    try {
      localStorage.setItem('kalshi_decisions_v2', JSON.stringify(newDecisions));
    } catch(e) {}
    const fh = handle !== undefined ? handle : fileHandle;
    if (fh) {
      try {
        const allEntries = [
          ...(newDecisions.executed || []),
          ...(newDecisions.skipped || []),
          ...(newDecisions.rejected || [])
        ].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        const writable = await fh.createWritable();
        await writable.write(JSON.stringify(allEntries, null, 2));
        await writable.close();
      } catch(e) {
        addToast('File write failed: ' + e.message, 'error');
      }
    }
  };

  const handleExecuteTrade = (approval, amount) => {
    setConfirmTrade({ approval, amount });
  };

  const handleConfirmExecute = async () => {
    if (!confirmTrade) return;
    const { approval, amount } = confirmTrade;
    setExecuting(true);

    try {
      const res = await fetch(`${API_BASE}/api/approve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: approval.id, status: 'approved', amount }),
        signal: AbortSignal.timeout(15000),
      });

      if (res.ok) {
        const result = await res.json().catch(() => ({}));
        setApiConnected(true);
        if (apiPending !== null) setApiPending(apiPending.filter(p => p.id !== approval.id));

        const entry = {
          id: approval.id,
          instrument: approval.instrument,
          action: approval.direction,
          amount,
          status: 'executed',
          timestamp: new Date().toISOString(),
          original_proposed: approval.proposed_size,
          order_result: result,
        };
        const newDecisions = {
          ...decisions,
          executed: [...decisions.executed, entry],
        };
        setDecisions(newDecisions);
        await persistDecisions(newDecisions);
        addToast(`Executed: ${approval.instrument} ${approval.direction} $${amount} — opening Kalshi...`, 'success');
        // Open Kalshi so user can verify the order landed
        setTimeout(() => window.open(kalshiUrl(approval.instrument), '_blank'), 800);
      } else {
        const errText = await res.text().catch(() => 'Unknown error');
        addToast(`Trade failed: ${errText}`, 'error');
      }
    } catch (e) {
      // API not reachable — still record locally as pending execution
      const entry = {
        id: approval.id,
        instrument: approval.instrument,
        action: approval.direction,
        amount,
        openedAt: new Date().toISOString(),
        original_proposed: approval.proposed_size,
      };
      const newDecisions = { ...decisions, opened: [...decisions.opened, entry] };
      setDecisions(newDecisions);
      persistDecisions(newDecisions);
      addToast(`API unreachable — queued locally. Execute manually on Kalshi.`, 'error');
      window.open(kalshiUrl(approval.instrument), '_blank');
    }

    setExecuting(false);
    setConfirmTrade(null);
  };

  const handleMarkExecuted = async (entry) => {
    const executedEntry = { ...entry, status: 'executed', timestamp: new Date().toISOString() };
    const newDecisions = {
      ...decisions,
      opened: decisions.opened.filter(o => o.id !== entry.id),
      executed: [...decisions.executed, executedEntry],
    };
    setDecisions(newDecisions);
    await persistDecisions(newDecisions);
    addToast(`Executed: ${entry.instrument} ${entry.action} $${entry.amount}`, 'success');
  };

  const handleMarkSkipped = async (entry) => {
    const skippedEntry = { ...entry, status: 'skipped', timestamp: new Date().toISOString() };
    const newDecisions = {
      ...decisions,
      opened: decisions.opened.filter(o => o.id !== entry.id),
      skipped: [...decisions.skipped, skippedEntry],
    };
    setDecisions(newDecisions);
    await persistDecisions(newDecisions);
    addToast(`Skipped: ${entry.instrument}`, 'info');
  };

  const handleReturnToPending = (entry) => {
    const newDecisions = { ...decisions, opened: decisions.opened.filter(d => d.id !== entry.id) };
    setDecisions(newDecisions);
    persistDecisions(newDecisions);
    addToast(`Returned ${entry.instrument} to pending`, 'info');
  };

  const handleReject = async (approval) => {
    try {
      const res = await fetch(`${API_BASE}/api/approve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: approval.id, status: 'rejected', amount: 0 }),
        signal: AbortSignal.timeout(5000),
      });
      if (res.ok) {
        setApiConnected(true);
        if (apiPending !== null) setApiPending(apiPending.filter(p => p.id !== approval.id));
      }
    } catch (e) {}
    const entry = {
      id: approval.id,
      instrument: approval.instrument,
      action: approval.direction,
      amount: 0,
      status: 'rejected',
      timestamp: new Date().toISOString(),
      original_proposed: approval.proposed_size
    };
    const newDecisions = { ...decisions, rejected: [...decisions.rejected, entry] };
    setDecisions(newDecisions);
    await persistDecisions(newDecisions);
    addToast(`Rejected: ${approval.instrument}`, 'reject');
  };

  const allDecidedIds = new Set([
    ...decisions.opened.map(d => d.id),
    ...decisions.executed.map(d => d.id),
    ...decisions.skipped.map(d => d.id),
    ...decisions.rejected.map(d => d.id),
  ]);

  // Merge API pending with static data — API takes priority, static fills gaps
  const apiItems = apiPending || [];
  const apiIds = new Set(apiItems.map(a => a.id));
  const staticItems = (data.pending_approvals || []).filter(a => !apiIds.has(a.id));
  const pending = [...apiItems, ...staticItems].filter(ap => !allDecidedIds.has(ap.id));
  const openedItems = decisions.opened;
  const tradeLog = [...decisions.executed, ...decisions.skipped]
    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  const rejectedItems = decisions.rejected;

  return (
    <div className="space-y-6">
      <ToastContainer toasts={toasts} />

      {/* Confirmation Modal */}
      {confirmTrade && (
        <ConfirmTradeModal
          approval={confirmTrade.approval}
          amount={confirmTrade.amount}
          onConfirm={handleConfirmExecute}
          onCancel={() => { if (!executing) setConfirmTrade(null); }}
          executing={executing}
        />
      )}

      {/* Connection bar */}
      <div className="flex items-center justify-between bg-gray-800 rounded-lg px-3 py-2 border border-gray-700">
        <div className="flex items-center gap-2">
          <span className={`w-2 h-2 rounded-full flex-shrink-0 ${apiConnected ? 'bg-green-400 live-dot' : fileHandle ? 'bg-yellow-400' : 'bg-gray-500'}`} />
          <span className="text-xs text-gray-400">
            {apiConnected
              ? <span>API <span className="text-green-400">live</span></span>
              : fileHandle
                ? <span>approvals.json <span className="text-yellow-400">connected</span></span>
                : 'Decisions saved to browser storage'}
          </span>
        </div>
        {!apiConnected && (
          <button
            onClick={connectFile}
            className="text-xs text-blue-400 hover:text-blue-300 px-2 py-1 rounded hover:bg-gray-700 transition-colors whitespace-nowrap ml-2"
          >
            {fileHandle ? '↺ reconnect' : '📁 connect file'}
          </button>
        )}
      </div>

      {/* Pending Approvals */}
      {pending.length > 0 && (
        <div className="space-y-3">
          <h3 className="text-yellow-400 font-semibold text-sm uppercase tracking-wider flex items-center gap-2">
            <span className="w-2 h-2 rounded-full bg-yellow-400 live-dot" />
            Pending Approval ({pending.length})
          </h3>
          {pending.map(ap => (
            <ApprovalCard
              key={ap.id}
              approval={ap}
              onExecuteTrade={handleExecuteTrade}
              onReject={handleReject}
            />
          ))}
        </div>
      )}

      {/* Opened in Kalshi — awaiting confirmation */}
      {openedItems.length > 0 && (
        <div className="space-y-3">
          <h3 className="text-blue-400 font-semibold text-sm uppercase tracking-wider flex items-center gap-2">
            <span className="w-2 h-2 rounded-full bg-blue-400 live-dot" />
            Opened in Kalshi ({openedItems.length})
          </h3>
          {openedItems.map(entry => (
            <OpenedCard
              key={entry.id}
              entry={entry}
              onMarkExecuted={handleMarkExecuted}
              onMarkSkipped={handleMarkSkipped}
              onReturnToPending={handleReturnToPending}
            />
          ))}
        </div>
      )}

      {pending.length === 0 && openedItems.length === 0 && tradeLog.length === 0 && rejectedItems.length === 0 && (
        <div className="text-gray-500 text-sm text-center py-8 bg-gray-800 rounded-xl border border-gray-700">
          No pending approvals
        </div>
      )}

      {/* Rejected */}
      {rejectedItems.length > 0 && (
        <div className="space-y-2">
          <h3 className="text-red-400 font-semibold text-sm uppercase tracking-wider">
            Rejected ({rejectedItems.length})
          </h3>
          {rejectedItems.map(d => (
            <div key={d.id} className="bg-gray-800 rounded-xl border border-gray-700 p-3 flex items-center justify-between gap-2">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="px-2 py-0.5 rounded text-xs font-semibold bg-gray-700 text-red-400 border border-gray-600">
                  REJECTED
                </span>
                <span className="font-mono text-sm text-gray-500">{d.instrument}</span>
                <span className="text-xs text-gray-600">proposed ${d.original_proposed}</span>
              </div>
              <span className="text-xs text-gray-600 whitespace-nowrap flex-shrink-0">
                {new Date(d.timestamp).toLocaleTimeString()}
              </span>
            </div>
          ))}
        </div>
      )}

      {/* Trade Log */}
      {tradeLog.length > 0 && (
        <div className="space-y-2">
          <h3 className="text-gray-400 font-semibold text-sm uppercase tracking-wider">
            Trade Log ({tradeLog.length})
          </h3>
          {tradeLog.map((d, i) => (
            <div key={d.id + i} className="bg-gray-800 rounded-xl border border-gray-700 p-3 flex items-center justify-between gap-2">
              <div className="flex items-center gap-2 flex-wrap">
                <span className={`px-2 py-0.5 rounded text-xs font-semibold border ${
                  d.status === 'executed'
                    ? 'bg-green-900 text-green-300 border-green-700'
                    : 'bg-gray-700 text-gray-400 border-gray-600'
                }`}>
                  {d.status.toUpperCase()}
                </span>
                <span className="font-mono text-sm text-gray-200">{d.instrument}</span>
                {d.status === 'executed' && (
                  <>
                    <span className={`text-xs px-1.5 py-0.5 rounded ${d.action === 'YES' ? 'bg-green-900 text-green-400' : 'bg-red-900 text-red-400'}`}>
                      {d.action}
                    </span>
                    <span className="text-sm font-semibold text-green-400">${d.amount}</span>
                  </>
                )}
              </div>
              <span className="text-xs text-gray-600 whitespace-nowrap flex-shrink-0">
                {new Date(d.timestamp).toLocaleTimeString()}
              </span>
            </div>
          ))}
        </div>
      )}

      {/* Active Positions */}
      <div className="space-y-3">
        <h3 className="text-gray-400 font-semibold text-sm uppercase tracking-wider">
          Active Positions ({(data.active_positions || []).length})
        </h3>
        {(data.active_positions || []).map(pos => (
          <PositionCard key={pos.id} pos={pos} />
        ))}
        {(!data.active_positions || data.active_positions.length === 0) && (
          <div className="text-gray-500 text-sm text-center py-8 bg-gray-800 rounded-xl border border-gray-700">
            No active positions
          </div>
        )}
      </div>
    </div>
  );
}

// ─── VIEW 3: CALIBRATION ─────────────────────────────────────────────────────

  const domains = [
    { name: "Finance / Macro", trades: 0, brier: null, accuracy: null },
    { name: "Geopolitics", trades: 0, brier: null, accuracy: null },
    { name: "Energy", trades: 0, brier: null, accuracy: null },
    { name: "Trade Policy", trades: 0, brier: null, accuracy: null },
  ];
  const bands = [
    { label: "50–60%", predicted: 0, actual: 0 },
    { label: "60–70%", predicted: 0, actual: 0 },
    { label: "70–80%", predicted: 0, actual: 0 },
    { label: "80–90%", predicted: 0, actual: 0 },
    { label: "90–100%", predicted: 0, actual: 0 },
  ];

  return (
    <div className="space-y-6">
      <div className="bg-blue-900/30 border border-blue-700 rounded-xl p-4 text-center">
        <p className="text-blue-300 text-sm">
          <span className="font-semibold">Phase 1 — Collecting data.</span> Calibration metrics build as trades resolve. Check back after first resolved positions.
        </p>
      </div>

      {/* Overall Brier Score */}
      <div className="flex flex-col sm:flex-row gap-6 items-center justify-center py-4">

            <svg viewBox="0 0 100 100" className="w-full h-full -rotate-90">
              <circle cx="50" cy="50" r="42" fill="none" stroke="#374151" strokeWidth="10" />
              <circle cx="50" cy="50" r="42" fill="none" stroke="#60a5fa" strokeWidth="10"

            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className="text-3xl font-bold text-gray-100">—</span>
              <span className="text-xs text-gray-500">Brier</span>
            </div>
          </div>
          <p className="text-sm text-gray-400 mt-2">Overall Brier Score</p>
          <p className="text-xs text-gray-500">Lower is better · 0 = perfect · 1 = worst</p>
        </div>
        <div className="text-sm text-gray-400 space-y-2 max-w-xs">
          <p className="font-medium text-gray-300">Target benchmarks:</p>
          <div className="space-y-1 text-xs">
            <div className="flex justify-between gap-4"><span>Expert forecaster</span><span className="text-green-400">~0.15</span></div>
            <div className="flex justify-between gap-4"><span>Good forecaster</span><span className="text-yellow-400">~0.20</span></div>
            <div className="flex justify-between gap-4"><span>Baseline (50/50)</span><span className="text-red-400">0.25</span></div>
          </div>
        </div>
      </div>

      {/* Domain Breakdown */}
      <div className="space-y-2">
        <h3 className="text-gray-400 font-semibold text-sm uppercase tracking-wider">Domain Breakdown</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-gray-500 text-xs uppercase border-b border-gray-700">

                <th className="text-right pb-2 pr-4">Resolved</th>
                <th className="text-right pb-2 pr-4">Brier</th>
                <th className="text-right pb-2">Accuracy</th>
              </tr>
            </thead>
            <tbody>
              {domains.map((d, i) => (
                <tr key={i} className="border-b border-gray-800">
                  <td className="py-2 pr-4 text-gray-300">{d.name}</td>
                  <td className="py-2 pr-4 text-right text-gray-500">—</td>
                  <td className="py-2 pr-4 text-right text-gray-500">—</td>
                  <td className="py-2 text-right text-gray-500">—</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

      {/* Confidence Band Chart */}
      <div className="space-y-2">
        <h3 className="text-gray-400 font-semibold text-sm uppercase tracking-wider">Confidence Calibration</h3>
        <p className="text-xs text-gray-500">Predicted win rate vs actual win rate by confidence band</p>
        <div className="space-y-3 pt-2">
          {bands.map((b, i) => (
            <div key={i} className="space-y-1">
              <div className="flex justify-between text-xs text-gray-500">
                <span>{b.label}</span>
                <span>0 trades</span>
              </div>
              <div className="relative h-5 bg-gray-700 rounded-full overflow-hidden">
                <div className="absolute inset-0 flex items-center px-2">
                  <span className="text-xs text-gray-500">No data yet</span>

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('intelligence');
  const [feedData, setFeedData] = useState(null);
  const [narrativeData, setNarrativeData] = useState(null);
  const [thesisData, setThesisData] = useState(null);
  const [lastRefresh, setLastRefresh] = useState(new Date().toISOString());
  const [loading, setLoading] = useState(false);

  const loadData = useCallback(async () => {
    setLoading(true);
    try {
      // Try to load published dashboard_data.json first
      const res = await fetch(`dashboard_data.json?t=${Date.now()}`);
      if (res.ok) {
        const all = await res.json();
        if (all.unified_feed) setFeedData(all.unified_feed);
        if (all.narrative_signals) setNarrativeData(all.narrative_signals);
        if (all.thesis_dashboard) setThesisData(all.thesis_dashboard);
        setLastRefresh(all.generated_at || new Date().toISOString());
      }
    } catch (e) {
      // Silently fall back to embedded sample data
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    loadData();
    // Auto-refresh every 60 seconds on intelligence tab
    const interval = setInterval(() => {
      if (tab === 'intelligence') loadData();
    }, 60000);
    return () => clearInterval(interval);
  }, [tab, loadData]);

  const tabs = [
    { id: 'intelligence', label: 'Intelligence', icon: '⚡' },
    { id: 'trades', label: 'Trades', icon: '📊' },
    { id: 'calibration', label: 'Calibration', icon: '🎯' },
  ];

  return (
    <div className="min-h-screen bg-gray-900 text-gray-100">
      {/* Header */}
      <div className="sticky top-0 z-50 bg-gray-900 border-b border-gray-800 px-4 py-3">
        <div className="max-w-4xl mx-auto flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-2 h-2 rounded-full bg-green-400 live-dot" />
            <span className="font-semibold text-gray-100">Kalshi Intelligence</span>
            <span className="text-gray-600 text-xs hidden sm:inline">/ mikedmote52</span>
          </div>
          <button
            onClick={loadData}
            className="text-xs text-gray-500 hover:text-gray-300 transition-colors px-2 py-1 rounded bg-gray-800 hover:bg-gray-700"
          >
            {loading ? '↻ loading...' : '↻ refresh'}
          </button>
        </div>
      </div>

      {/* Tabs */}
      <div className="sticky top-14 z-40 bg-gray-900 border-b border-gray-800">
        <div className="max-w-4xl mx-auto flex">
          {tabs.map(t => (
            <button
              key={t.id}
              onClick={() => setTab(t.id)}
              className={`flex items-center gap-2 px-4 py-3 text-sm font-medium transition-colors ${
                tab === t.id
                  ? 'tab-active text-blue-400'
                  : 'text-gray-400 hover:text-gray-200'
              }`}
            >
              <span className="text-base">{t.icon}</span>
              <span>{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div className="max-w-4xl mx-auto px-4 py-6">
        {tab === 'intelligence' && (
          <IntelligenceFeed
            feedData={feedData}
            narrativeData={narrativeData}
            lastRefresh={lastRefresh}
          />
        )}
        {tab === 'trades' && (
          <TradeCommand thesisData={thesisData} />
        )}
        {tab === 'calibration' && (
          <Calibration />
        )}
      </div>

      {/* Footer */}
      <div className="text-center py-6 text-xs text-gray-600 border-t border-gray-800">
        Kalshi Intelligence Dashboard · Auto-refreshes every 60s on Intelligence view
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
